<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="{{ url_for('static', filename='icon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Login & Sign Up | DocuBridge</title>
    <style>
        .auth-tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; cursor: pointer; background: none; border: none; color: var(--text); font-weight: bold; font-size: 1rem; opacity: 0.5; transition: 0.3s; outline: none; }
        .tab-btn.active { opacity: 1; border-bottom: 3px solid var(--accent); color: var(--accent); }
        .form-section { display: none; animation: fadeIn 0.4s ease-in-out; }
        .form-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .flash-container { margin-bottom: 15px; font-size: 0.9rem; font-weight: bold; padding: 10px; border-radius: 8px; }
        .msg-danger { color: #ff4757; background: rgba(255, 71, 87, 0.1); }
        .msg-success { color: #22c55e; background: rgba(34, 197, 94, 0.1); }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="logo">DocuBridge</a>
        <button class="mode-btn" onclick="toggleMode()">🌓</button>
    </nav>

    <div class="main-container">
        <div class="card">
            <div class="auth-tabs">
                <button id="login-tab" class="tab-btn active" onclick="showAuth('login')">Login</button>
                <button id="signup-tab" class="tab-btn" onclick="showAuth('signup')">Sign Up</button>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="flash-container msg-{{ category }}">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <div id="login-form" class="form-section active">
                <h1>Welcome Back</h1>
                <form action="/login" method="POST">
                    <input type="text" name="username" placeholder="Username" required class="form-input">
                    <input type="password" name="password" placeholder="Password" required class="form-input">
                    <button type="submit" class="btn">Login Now</button>
                </form>
            </div>

            <div id="signup-form" class="form-section">
                <h1>Create Account</h1>
                <form action="/signup" method="POST">
                    <input type="text" name="username" placeholder="Choose Username" required class="form-input">
                    <input type="password" name="password" placeholder="Set Password" required class="form-input">
                    <button type="submit" class="btn">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script>
    function showAuth(type) {
        document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        if(type === 'login') {
            document.getElementById('login-form').classList.add('active');
            document.getElementById('login-tab').classList.add('active');
        } else {
            document.getElementById('signup-form').classList.add('active');
            document.getElementById('signup-tab').classList.add('active');
        }
    }
    function toggleMode() {
        const theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    }
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
    </script>
</body>
</html>
